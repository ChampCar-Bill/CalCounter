<!DOCTYPE html>
<html>
<head>
  <title>Calorie Counter</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#222222">
  <link rel="manifest" href="manifest.json">

  <style>
    body { font-family: Arial, sans-serif; max-width: 650px; margin: auto; padding: 18px; background:#f5f5f5; }
    h1, h2 { margin-bottom: 8px; }
    .card { background:white; padding:16px; margin:12px 0; border-radius:12px; box-shadow:0 2px 8px #ddd; }
    input, select, button, textarea { width:100%; padding:12px; margin:6px 0; font-size:16px; box-sizing:border-box; }
    button { background:#222; color:white; border:0; border-radius:8px; cursor:pointer; }
    button.secondary { background:#777; }
    button.danger { background:#b00020; }
    .entry { border-bottom:1px solid #ddd; padding:8px 0; }
    .small { font-size:14px; color:#666; }
    canvas { width:100%; max-height:260px; }
  </style>
</head>

<body>

<h1>Calorie Counter</h1>
<div class="small" id="date"></div>

<div class="card">
  <h2>Daily Goals</h2>
  <input id="goal" type="number" placeholder="Daily calorie goal">
  <input id="proteinGoal" type="number" placeholder="Daily protein goal in grams">
  <button onclick="saveGoals()">Save Goals</button>
  <p><b>Calories:</b> <span id="total">0</span> / <span id="goalDisplay">0</span></p>
  <p><b>Remaining:</b> <span id="remaining">0</span></p>
  <p><b>Protein:</b> <span id="proteinTotal">0</span>g / <span id="proteinGoalDisplay">0</span>g</p>
</div>

<div class="card">
  <h2>Add Food</h2>
  <input id="food" placeholder="Food name">
  <input id="calories" type="number" placeholder="Calories">
  <input id="protein" type="number" step="0.1" placeholder="Protein grams">
  <select id="meal">
    <option>Breakfast</option>
    <option>Lunch</option>
    <option>Dinner</option>
    <option>Snack</option>
  </select>
  <button onclick="addFood()">Add Food</button>
  <button class="secondary" onclick="saveFavorite()">Save as Favorite</button>
</div>

<div class="card">
  <h2>Quick Estimate</h2>
  <textarea id="quickText" rows="4" placeholder="Example: 2 eggs, banana, greek yogurt"></textarea>
  <button onclick="quickEstimate()">Estimate Basic Foods</button>
  <p class="small">This uses simple built-in estimates, not a full nutrition database.</p>
</div>

<div class="card">
  <h2>Favorite Foods</h2>
  <select id="favorites"></select>
  <button onclick="addFavoriteFood()">Add Favorite</button>
</div>

<div class="card">
  <h2>Today’s Food</h2>
  <div id="list"></div>
  <button class="danger" onclick="clearDay()">Clear Today</button>
</div>

<div class="card">
  <h2>Weight Tracker</h2>
  <input id="weight" type="number" step="0.1" placeholder="Weight">
  <button onclick="saveWeight()">Save Weight</button>
  <canvas id="weightChart" width="600" height="250"></canvas>
  <div id="weightList"></div>
</div>

<div class="card">
  <h2>Export</h2>
  <button onclick="exportCSV()">Export Food Log CSV</button>
</div>

<script>
const today = new Date().toISOString().slice(0, 10);
document.getElementById("date").textContent = "Today: " + today;

let entries = JSON.parse(localStorage.getItem("food-" + today)) || [];
let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
let weights = JSON.parse(localStorage.getItem("weights")) || {};
let goal = Number(localStorage.getItem("goal")) || 2000;
let proteinGoal = Number(localStorage.getItem("proteinGoal")) || 150;

document.getElementById("goal").value = goal;
document.getElementById("proteinGoal").value = proteinGoal;

function saveGoals() {
  goal = Number(document.getElementById("goal").value) || 0;
  proteinGoal = Number(document.getElementById("proteinGoal").value) || 0;
  localStorage.setItem("goal", goal);
  localStorage.setItem("proteinGoal", proteinGoal);
  render();
}

function addFood() {
  const food = document.getElementById("food").value.trim();
  const calories = Number(document.getElementById("calories").value);
  const protein = Number(document.getElementById("protein").value) || 0;
  const meal = document.getElementById("meal").value;

  if (!food || !calories) return alert("Enter food name and calories.");

  entries.push({ food, calories, protein, meal });
  saveToday();

  document.getElementById("food").value = "";
  document.getElementById("calories").value = "";
  document.getElementById("protein").value = "";
}

function saveFavorite() {
  const food = document.getElementById("food").value.trim();
  const calories = Number(document.getElementById("calories").value);
  const protein = Number(document.getElementById("protein").value) || 0;

  if (!food || !calories) return alert("Enter food name and calories first.");

  favorites.push({ food, calories, protein });
  localStorage.setItem("favorites", JSON.stringify(favorites));
  renderFavorites();
}

function addFavoriteFood() {
  const index = document.getElementById("favorites").value;
  if (index === "") return;

  const fav = favorites[index];
  const meal = document.getElementById("meal").value;

  entries.push({ food: fav.food, calories: fav.calories, protein: fav.protein || 0, meal });
  saveToday();
}

function quickEstimate() {
  const text = document.getElementById("quickText").value.toLowerCase();

  const foods = {
    "egg": { calories: 70, protein: 6 },
    "banana": { calories: 105, protein: 1 },
    "apple": { calories: 95, protein: 0 },
    "oatmeal": { calories: 150, protein: 5 },
    "greek yogurt": { calories: 100, protein: 17 },
    "chicken breast": { calories: 165, protein: 31 },
    "protein shake": { calories: 160, protein: 25 },
    "bacon": { calories: 45, protein: 3 },
    "coffee": { calories: 5, protein: 0 },
    "rice": { calories: 205, protein: 4 },
    "bread": { calories: 80, protein: 3 }
  };

  for (const name in foods) {
    if (text.includes(name)) {
      entries.push({
        food: name,
        calories: foods[name].calories,
        protein: foods[name].protein,
        meal: document.getElementById("meal").value
      });
    }
  }

  saveToday();
  document.getElementById("quickText").value = "";
}

function saveToday() {
  localStorage.setItem("food-" + today, JSON.stringify(entries));
  render();
}

function clearDay() {
  if (!confirm("Clear today's food log?")) return;
  entries = [];
  saveToday();
}

function deleteEntry(index) {
  entries.splice(index, 1);
  saveToday();
}

function saveWeight() {
  const weight = Number(document.getElementById("weight").value);
  if (!weight) return alert("Enter your weight.");

  weights[today] = weight;
  localStorage.setItem("weights", JSON.stringify(weights));
  document.getElementById("weight").value = "";
  renderWeights();
}

function exportCSV() {
  let csv = "Date,Meal,Food,Calories,Protein\n";

  Object.keys(localStorage).forEach(key => {
    if (key.startsWith("food-")) {
      const date = key.replace("food-", "");
      const dayEntries = JSON.parse(localStorage.getItem(key)) || [];
      dayEntries.forEach(e => {
        csv += `${date},${e.meal},${e.food},${e.calories},${e.protein || 0}\n`;
      });
    }
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "calorie-log.csv";
  link.click();
}

function render() {
  let total = entries.reduce((sum, e) => sum + Number(e.calories), 0);
  let proteinTotal = entries.reduce((sum, e) => sum + Number(e.protein || 0), 0);

  document.getElementById("total").textContent = total;
  document.getElementById("goalDisplay").textContent = goal;
  document.getElementById("remaining").textContent = goal - total;
  document.getElementById("proteinTotal").textContent = proteinTotal.toFixed(1);
  document.getElementById("proteinGoalDisplay").textContent = proteinGoal;

  const list = document.getElementById("list");
  list.innerHTML = "";

  if (entries.length === 0) {
    list.innerHTML = "<p>No food added yet.</p>";
    return;
  }

  entries.forEach((entry, index) => {
    list.innerHTML += `
      <div class="entry">
        <b>${entry.meal}</b><br>
        ${entry.food}: ${entry.calories} cal, ${entry.protein || 0}g protein
        <br>
        <button class="danger" onclick="deleteEntry(${index})">Delete</button>
      </div>
    `;
  });
}

function renderFavorites() {
  const select = document.getElementById("favorites");
  select.innerHTML = "";

  if (favorites.length === 0) {
    select.innerHTML = `<option value="">No favorites saved</option>`;
    return;
  }

  favorites.forEach((fav, index) => {
    select.innerHTML += `<option value="${index}">${fav.food} - ${fav.calories} cal, ${fav.protein || 0}g protein</option>`;
  });
}

function renderWeights() {
  const div = document.getElementById("weightList");
  div.innerHTML = "";

  Object.keys(weights).sort().reverse().forEach(date => {
    div.innerHTML += `<div class="entry">${date}: ${weights[date]} lbs</div>`;
  });

  drawWeightChart();
}

function drawWeightChart() {
  const canvas = document.getElementById("weightChart");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const dates = Object.keys(weights).sort();
  if (dates.length < 2) {
    ctx.fillText("Add at least 2 weights to see a chart.", 20, 40);
    return;
  }

  const values = dates.map(d => Number(weights[d]));
  const min = Math.min(...values) - 2;
  const max = Math.max(...values) + 2;

  ctx.beginPath();

  values.forEach((value, i) => {
    const x = 40 + i * ((canvas.width - 80) / (values.length - 1));
    const y = canvas.height - 40 - ((value - min) / (max - min)) * (canvas.height - 80);

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);

    ctx.fillText(value, x - 10, y - 8);
  });

  ctx.stroke();
}

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}

render();
renderFavorites();
renderWeights();
</script>

</body>
</html>
